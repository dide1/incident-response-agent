services:
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: incidents
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  agent-backend:
    build: ./agent-backend
    ports:
      - "9000:9000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/incidents
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_REPOS=${GITHUB_REPOS:-}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET:-}
      - GITHUB_POLL_INTERVAL=${GITHUB_POLL_INTERVAL:-120}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - SESSION_SECRET=${SESSION_SECRET:-}
      - ALLOWED_GITHUB_USER=${ALLOWED_GITHUB_USER:-}
      - LOG_ANALYZER_BIN=/usr/local/bin/log-analyzer
    volumes:
      - /root/log-analyzer-linux:/usr/local/bin/log-analyzer:ro
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
