groups:
  - name: service_health
    interval: 15s
    rules:
      # Fires when >50% of requests are returning 5xx for at least 30s
      - alert: HighErrorRate
        expr: |
          (
            sum by (job) (rate(http_request_errors_total[2m]))
            /
            sum by (job) (rate(http_requests_total[2m]))
          ) > 0.5
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "High error rate on {{ $labels.job }}"
          description: >
            {{ $labels.job }} error rate is {{ $value | humanizePercentage }}
            (threshold: 50%). Possible bad deploy or downstream dependency failure.

      # Fires when P99 latency exceeds 2s for at least 30s (N+1 query symptom)
      - alert: HighLatency
        expr: |
          histogram_quantile(
            0.99,
            sum by (job, le) (rate(http_request_duration_seconds_bucket[2m]))
          ) > 2.0
        for: 30s
        labels:
          severity: warning
        annotations:
          summary: "High P99 latency on {{ $labels.job }}"
          description: >
            {{ $labels.job }} P99 latency is {{ $value | humanizeDuration }}
            (threshold: 2s). Possible N+1 query or slow downstream call.
