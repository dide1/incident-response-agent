global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: "api-gateway"
    static_configs:
      - targets: ["api-gateway:8000"]

  - job_name: "order-service"
    static_configs:
      - targets: ["order-service:8000"]

  - job_name: "payments-service"
    static_configs:
      - targets: ["payments-service:8000"]
