<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Incident Response Agent</title>
<style>
  :root {
    --bg: #faf8f4;        /* bone */
    --panel: #ffffff;
    --ink: #1c1917;       /* near-black warm */
    --muted: #78716c;     /* stone */
    --line: #e7e2da;
    --accent: #8c4a2f;    /* burnt sienna */
    --critical: #7f1d1d;
    --warning: #92600a;
    --info: #44575e;
    --ok: #3f5c46;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--bg); color: var(--ink);
    font: 15px/1.55 -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  header {
    border-bottom: 1px solid var(--line);
    padding: 28px 40px 22px;
    display: flex; align-items: baseline; justify-content: space-between;
    flex-wrap: wrap; gap: 8px;
  }
  h1 { font-family: Georgia, "Times New Roman", serif; font-size: 26px; font-weight: 600; letter-spacing: -0.01em; }
  h1 small { color: var(--muted); font-size: 14px; font-family: inherit; font-weight: 400; margin-left: 12px; }
  .header-right { display: flex; align-items: center; gap: 16px; font-size: 13px; }
  #user-info { color: var(--muted); }
  #user-info strong { color: var(--ink); }
  a.signout { color: var(--muted); text-decoration: none; }
  a.signout:hover { color: var(--accent); }
  #status { color: var(--muted); font-size: 13px; }
  nav { padding: 0 40px; border-bottom: 1px solid var(--line); display: flex; gap: 28px; }
  nav button {
    background: none; border: none; padding: 14px 2px; cursor: pointer;
    font: 600 14px inherit; color: var(--muted);
    border-bottom: 2px solid transparent; margin-bottom: -1px;
  }
  nav button.active { color: var(--ink); border-bottom-color: var(--accent); }
  main { max-width: 980px; margin: 0 auto; padding: 32px 40px 80px; }
  .empty { color: var(--muted); padding: 60px 0; text-align: center; font-family: Georgia, serif; font-style: italic; }

  .card {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 6px; padding: 22px 26px; margin-bottom: 18px;
  }
  .card-head { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
  .sev {
    font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    padding: 3px 9px; border-radius: 3px; color: #fff;
  }
  .sev.critical { background: var(--critical); }
  .sev.warning  { background: var(--warning); }
  .sev.info     { background: var(--info); }
  .st {
    font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
    padding: 2px 8px; border-radius: 3px; border: 1px solid;
  }
  .st.investigating   { color: var(--warning); border-color: var(--warning); }
  .st.brief_posted    { color: var(--muted); border-color: var(--line); }
  .st.resolved        { color: var(--ok); border-color: var(--ok); }
  .st.failed          { color: var(--critical); border-color: var(--critical); }
  .card-head .title { font-family: Georgia, serif; font-size: 19px; font-weight: 600; }
  .card-head .when { color: var(--muted); font-size: 13px; margin-left: auto; }
  .impact { color: var(--muted); font-size: 13.5px; margin-top: 8px; }
  .impact strong { color: var(--ink); }

  .commit {
    margin-top: 14px; padding: 14px 16px;
    background: var(--bg); border: 1px solid var(--line); border-radius: 4px;
  }
  .commit .sha { font: 600 13px ui-monospace, Menlo, monospace; color: var(--accent); }
  .commit .meta { color: var(--muted); font-size: 13px; }
  .commit .msg { font-style: italic; font-family: Georgia, serif; margin-top: 2px; }
  .commit .why { margin-top: 8px; font-size: 14px; }
  .conf { font-size: 12px; color: var(--muted); }
  .runbook { margin-top: 12px; font-size: 14px; }
  .runbook .rb-title { font-weight: 600; }
  .runbook .rb-file { font: 12px ui-monospace, Menlo, monospace; color: var(--muted); }

  details { margin-top: 12px; }
  summary { cursor: pointer; color: var(--muted); font-size: 13px; user-select: none; }
  pre.toollog {
    margin-top: 10px; padding: 14px; overflow-x: auto;
    background: #14100e; color: #d6cfc4; border-radius: 4px;
    font: 12px/1.5 ui-monospace, Menlo, monospace; max-height: 420px; overflow-y: auto;
  }

  .pm { font-size: 14.5px; }
  .pm h1 { font-size: 22px; margin: 4px 0 10px; }
  .pm h2 {
    font-family: Georgia, serif; font-size: 17px; font-weight: 600;
    margin: 22px 0 8px; padding-bottom: 4px; border-bottom: 1px solid var(--line);
  }
  .pm p { margin: 8px 0; }
  .pm table { border-collapse: collapse; margin: 10px 0; width: 100%; font-size: 13.5px; }
  .pm th, .pm td { border: 1px solid var(--line); padding: 6px 10px; text-align: left; }
  .pm th { background: var(--bg); }
  .pm code { font: 13px ui-monospace, Menlo, monospace; background: var(--bg); padding: 1px 5px; border-radius: 3px; }
  .pm pre { background: #14100e; color: #d6cfc4; padding: 12px; border-radius: 4px; overflow-x: auto; margin: 10px 0; }
  .pm pre code { background: none; color: inherit; padding: 0; }
  .pm ul { padding-left: 22px; margin: 8px 0; }
  .pm li { margin: 3px 0; }
  .pm li.task { list-style: none; margin-left: -18px; }
  .pm strong { font-weight: 650; }

  /* Repos tab */
  .repo-list { margin-bottom: 32px; }
  .repo-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px; background: var(--panel); border: 1px solid var(--line);
    border-radius: 6px; margin-bottom: 10px;
  }
  .repo-name { font: 600 15px ui-monospace, Menlo, monospace; }
  .repo-meta { color: var(--muted); font-size: 13px; margin-top: 2px; }
  .btn-remove {
    background: none; border: 1px solid var(--line); padding: 5px 12px;
    border-radius: 4px; cursor: pointer; font: 13px inherit; color: var(--muted);
  }
  .btn-remove:hover { border-color: var(--critical); color: var(--critical); }
  .add-repo-form { display: flex; gap: 10px; margin-bottom: 32px; flex-wrap: wrap; }
  .add-repo-form input {
    flex: 1; min-width: 220px; padding: 9px 12px; border: 1px solid var(--line);
    border-radius: 4px; font: 15px inherit; background: var(--panel); color: var(--ink);
  }
  .add-repo-form input:focus { outline: none; border-color: var(--accent); }
  .btn-primary {
    padding: 9px 20px; background: var(--accent); color: #fff;
    border: none; border-radius: 4px; cursor: pointer; font: 600 14px inherit;
  }
  .btn-primary:hover { opacity: 0.88; }
  .webhook-box {
    background: #14100e; color: #d6cfc4; padding: 18px 20px; border-radius: 6px;
    margin-bottom: 18px; font-size: 13.5px;
  }
  .webhook-box h3 { color: #e5dfd6; font-size: 15px; margin-bottom: 14px; }
  .wh-row { display: flex; gap: 12px; align-items: center; margin: 8px 0; }
  .wh-label { color: #78716c; min-width: 100px; font-size: 12px; }
  .wh-val { font: 13px ui-monospace, Menlo, monospace; color: #d6cfc4; word-break: break-all; }
  .section-title {
    font-family: Georgia, serif; font-size: 18px; font-weight: 600;
    margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--line);
  }
  .onboarding-note {
    background: #fffbf5; border: 1px solid #e7d9c4; border-radius: 6px;
    padding: 18px 22px; margin-bottom: 28px; color: var(--muted); font-size: 14px;
    line-height: 1.65;
  }
  .onboarding-note strong { color: var(--ink); }
</style>
</head>
<body>
<header>
  <h1>Incident Response Agent<small>autonomous triage &amp; postmortems</small></h1>
  <div class="header-right">
    <span id="user-info"></span>
    <span id="status">loading…</span>
    <a href="/auth/logout" class="signout">sign out</a>
  </div>
</header>
<nav>
  <button id="tab-incidents" class="active" onclick="show('incidents')">Incidents</button>
  <button id="tab-postmortems" onclick="show('postmortems')">Postmortems</button>
  <button id="tab-repos" onclick="show('repos')">Repos</button>
</nav>
<main>
  <div id="view-incidents"></div>
  <div id="view-postmortems" style="display:none"></div>
  <div id="view-repos" style="display:none"></div>
</main>

<script>
const $ = (id) => document.getElementById(id);
let active = 'incidents';
let _me = null;
let _pendingWebhook = null;

function show(tab) {
  active = tab;
  for (const t of ['incidents', 'postmortems', 'repos']) {
    $('tab-' + t).classList.toggle('active', t === tab);
    $('view-' + t).style.display = t === tab ? '' : 'none';
  }
  if (tab === 'repos' && _me) renderRepos(_me.repos);
}

const esc = (s) => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function fmtTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleString([], {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
}

function impactLine(imp) {
  if (!imp) return '';
  const parts = [];
  if (imp.error_rate_pct != null) parts.push(`<strong>${imp.error_rate_pct}%</strong> error rate`);
  if (imp.failed_per_min != null) parts.push(`~<strong>${Math.round(imp.failed_per_min)}</strong> failed req/min`);
  if (imp.requests_per_min != null) parts.push(`${Math.round(imp.requests_per_min)} req/min`);
  if (imp.p99_latency_s != null) parts.push(`P99 <strong>${imp.p99_latency_s}s</strong>`);
  return parts.length ? `<div class="impact">${parts.join(' &nbsp;·&nbsp; ')}</div>` : '';
}

function incidentCard(row) {
  const r = row.result || {};
  const c = r.likely_commit;
  const rb = r.runbook;
  const commitHtml = c ? `
    <div class="commit">
      <span class="sha">${esc((c.sha||'').slice(0,8))}</span>
      <span class="meta"> · ${esc(c.author||'')} </span>
      <span class="conf">(${esc(r.confidence||'?')} confidence)</span>
      <div class="msg">${esc(c.message||'')}</div>
      <div class="why">${esc(r.error_match || r.reasoning || '')}</div>
    </div>` : `
    <div class="commit">
      <span class="conf">No commit blamed (${esc(r.confidence||'?')} confidence)</span>
      <div class="why">${esc(r.reasoning||'')}</div>
    </div>`;
  const rbHtml = rb ? `
    <div class="runbook">
      <span class="rb-title">Runbook: ${esc(rb.title||'')}</span>
      <span class="rb-file"> — ${esc(rb.filename||'')}</span><br>
      ${esc(rb.summary||'')}
    </div>` : '';
  const toolLog = (r.tool_log || []).map(t =>
    `▸ ${t.tool}(${JSON.stringify(t.input)})`).join('\n');
  const status = row.status || 'brief_posted';
  const statusLabel = status.replace('_', ' ');
  const when = status === 'resolved' && row.resolved_at
    ? `resolved ${fmtTime(row.resolved_at)}`
    : fmtTime(row.created_at);
  return `
  <div class="card">
    <div class="card-head">
      <span class="sev ${esc(row.severity||'info')}">${esc(row.severity||'info')}</span>
      <span class="title">${esc(row.alertname)} — ${esc(row.service)}</span>
      <span class="st ${esc(status)}">${esc(statusLabel)}</span>
      <span class="when">${esc(when)}</span>
    </div>
    ${status === 'investigating'
      ? '<div class="impact" style="font-style:italic">agent investigating…</div>'
      : impactLine(r.impact) + commitHtml + rbHtml + `
    <details><summary>agent tool calls (${(r.tool_log||[]).length})</summary>
      <pre class="toollog">${esc(toolLog)}</pre>
    </details>`}
  </div>`;
}

/* Minimal markdown renderer */
function md(text) {
  const lines = String(text||'').split('\n');
  let html = '', inCode = false, inList = false, tableBuf = [];

  const flushTable = () => {
    if (!tableBuf.length) return;
    const rows = tableBuf.filter(l => !/^\s*\|[\s\-|:]+\|\s*$/.test(l));
    let t = '<table>';
    rows.forEach((l, i) => {
      const cells = l.split('|').slice(1, -1).map(c => inline(c.trim()));
      const tag = i === 0 ? 'th' : 'td';
      t += '<tr>' + cells.map(c => `<${tag}>${c}</${tag}>`).join('') + '</tr>';
    });
    html += t + '</table>'; tableBuf = [];
  };
  const inline = (s) => esc(s)
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

  for (const raw of lines) {
    if (raw.startsWith('```')) {
      flushTable();
      html += inCode ? '</code></pre>' : '<pre><code>';
      inCode = !inCode; continue;
    }
    if (inCode) { html += esc(raw) + '\n'; continue; }
    if (/^\s*\|/.test(raw)) { tableBuf.push(raw); continue; }
    flushTable();
    if (inList && !/^\s*- /.test(raw)) { html += '</ul>'; inList = false; }

    if (raw.startsWith('## '))      html += `<h2>${inline(raw.slice(3))}</h2>`;
    else if (raw.startsWith('# '))  html += `<h1>${inline(raw.slice(2))}</h1>`;
    else if (/^\s*- \[[ x]\]/.test(raw)) {
      if (!inList) { html += '<ul>'; inList = true; }
      const checked = /\[x\]/i.test(raw);
      html += `<li class="task"><input type="checkbox" disabled ${checked?'checked':''}> ${inline(raw.replace(/^\s*- \[[ x]\]\s*/i,''))}</li>`;
    }
    else if (/^\s*- /.test(raw)) {
      if (!inList) { html += '<ul>'; inList = true; }
      html += `<li>${inline(raw.replace(/^\s*- /,''))}</li>`;
    }
    else if (raw.trim() === '---' || raw.trim() === '') { /* skip */ }
    else html += `<p>${inline(raw)}</p>`;
  }
  if (inList) html += '</ul>';
  flushTable();
  return html;
}

function pmCard(row) {
  return `
  <div class="card">
    <div class="card-head">
      <span class="sev ok" style="background:var(--ok)">resolved</span>
      <span class="title">${esc(row.alertname)} — ${esc(row.service)}</span>
      <span class="when">${fmtTime(row.created_at)}</span>
    </div>
    <div class="pm">${md(row.content)}</div>
  </div>`;
}

function renderRepos(repos) {
  const el = $('view-repos');
  let html = '';

  if (_pendingWebhook) {
    const wh = _pendingWebhook;
    html += `
    <div class="webhook-box">
      <h3>Webhook setup for <strong>${esc(wh.owner)}/${esc(wh.repo)}</strong></h3>
      <p style="color:#a09080;margin-bottom:14px;font-size:13px">
        Go to <strong>GitHub → repo → Settings → Webhooks → Add webhook</strong> and enter:
      </p>
      <div class="wh-row"><span class="wh-label">Payload URL</span><span class="wh-val">${esc(wh.webhook_url)}</span></div>
      <div class="wh-row"><span class="wh-label">Content type</span><span class="wh-val">application/json</span></div>
      <div class="wh-row"><span class="wh-label">Secret</span><span class="wh-val">${esc(wh.webhook_secret)}</span></div>
      <div class="wh-row"><span class="wh-label">Events</span><span class="wh-val">Workflow runs, Pushes</span></div>
      <div style="margin-top:14px">
        <button class="btn-primary" onclick="_pendingWebhook=null;renderRepos(_me.repos)">Done</button>
      </div>
    </div>`;
  }

  html += `<div class="section-title">Connected Repos</div>`;

  if (!repos || repos.length === 0) {
    html += `
    <div class="onboarding-note">
      <strong>No repos connected yet.</strong><br>
      Connect a GitHub repo and the agent will monitor its CI runs, blame failing commits,
      and generate postmortems automatically. You'll set up a GitHub webhook in about 60 seconds.
    </div>`;
  } else {
    html += '<div class="repo-list">';
    for (const r of repos) {
      html += `
      <div class="repo-row">
        <div>
          <div class="repo-name">${esc(r.owner)}/${esc(r.repo)}</div>
          <div class="repo-meta">connected ${fmtTime(r.created_at)}</div>
        </div>
        <button class="btn-remove" onclick="removeRepo(${r.id})">Remove</button>
      </div>`;
    }
    html += '</div>';
  }

  html += `
  <div class="section-title" style="margin-top:28px">Add a Repo</div>
  <form class="add-repo-form" onsubmit="addRepo(event)">
    <input id="repo-input" type="text" placeholder="owner/repo (e.g. dide1/loupe)" autocomplete="off">
    <button type="submit" class="btn-primary">Connect</button>
  </form>`;

  el.innerHTML = html;
}

async function addRepo(e) {
  e.preventDefault();
  const input = $('repo-input');
  const val = input.value.trim();
  if (!val || !val.includes('/')) {
    input.style.borderColor = 'var(--critical)';
    return;
  }
  input.style.borderColor = '';
  try {
    const res = await fetch('/me/repos', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({repo: val}),
    });
    if (!res.ok) {
      const err = await res.json();
      alert(err.detail || 'Failed to add repo');
      return;
    }
    const row = await res.json();
    input.value = '';
    _pendingWebhook = row;
    // Reload me
    _me = await fetch('/me').then(r => r.json());
    renderRepos(_me.repos);
  } catch (err) {
    alert('Network error: ' + err.message);
  }
}

async function removeRepo(repoId) {
  if (!confirm('Remove this repo? Existing incidents will remain.')) return;
  await fetch(`/me/repos/${repoId}`, {method: 'DELETE'});
  _me = await fetch('/me').then(r => r.json());
  renderRepos(_me.repos);
}

async function loadMe() {
  try {
    _me = await fetch('/me').then(r => r.json());
    if (_me.username) {
      $('user-info').innerHTML = `signed in as <strong>${esc(_me.username)}</strong>`;
    }
    // First-time user: auto-show repos tab
    if (_me.repos && _me.repos.length === 0 && active === 'incidents') {
      show('repos');
    }
  } catch (_) {}
}

async function refresh() {
  try {
    const [inc, pms] = await Promise.all([
      fetch('/incidents').then(r => r.json()),
      fetch('/postmortems').then(r => r.json()),
    ]);
    $('view-incidents').innerHTML = inc.length
      ? inc.map(incidentCard).join('')
      : '<div class="empty">No incidents yet — connect a repo and push a failing commit.</div>';
    $('view-postmortems').innerHTML = pms.length
      ? pms.map(pmCard).join('')
      : '<div class="empty">No postmortems yet — they appear when incidents resolve.</div>';
    $('status').textContent =
      `${inc.length} incidents · ${pms.length} postmortems · updated ${new Date().toLocaleTimeString()}`;
  } catch (e) {
    $('status').textContent = 'connection lost — retrying…';
  }
}

loadMe();
refresh();
setInterval(refresh, 15000);
</script>
</body>
</html>
